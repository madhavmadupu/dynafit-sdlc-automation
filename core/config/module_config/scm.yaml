  "BOM": "bill of materials (BOM)"
  "bill of materials": "bill of materials (BOM)"
  "drop ship": "direct delivery (drop shipment)"
  "drop shipment": "direct delivery (drop shipment)"
  "back order": "backorder"
  "MRP": "master planning (MRP)"
  "material requirements planning": "master planning (MRP)"
  "safety stock": "safety stock planning"
  "min/max replenishment": "min/max replenishment strategy"
  "kanban": "kanban replenishment"
  "vendor-managed inventory": "consignment inventory"
