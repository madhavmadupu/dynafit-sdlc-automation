# Supply Chain Management module configuration
module: SCM
display_name: Supply Chain Management

signal_weights:
  cosine: 0.48
  overlap: 0.32
  history: 0.20

threshold_adjustments:
  fast_track_fit: 0.83    # SCM is moderately documented; slightly adjusted

d365_localization_gaps:
  IN:
    - "GST on procurement: D365 India localization provides GST integration; verify sub-rules correctness"
    - "e-way bill for inbound transfers: Requires connector or custom"
  US:
    - "US customs (CBP ACE filing): Requires TradeBeam or other trade compliance ISV"
    - "DDTC/ITAR compliance checks: Not standard; requires compliance ISV"
  EU:
    - "EU customs declaration (Import Control System 2 / ICS2): Requires customs connector"

